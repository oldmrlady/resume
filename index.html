<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graham Carroll — Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --white: #f5f4f0;
      --black: #0e0e0e;
      --mid: #8a8880;
      --rule: #d8d5cf;
      --accent: #b8a99a;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Geist Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 3rem 4rem 2.5rem;
      border-bottom: 1px solid var(--rule);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.1s;
    }

    .site-name {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .site-title {
      font-family: 'Geist Mono', monospace;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* ── GRID ── */
    main {
      padding: 4rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3.5rem 3rem;
    }

    /* ── VIDEO ITEM ── */
    .video-item {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s ease forwards;
    }

    .video-item:nth-child(1) { animation-delay: 0.3s; }
    .video-item:nth-child(2) { animation-delay: 0.48s; }
    .video-item:nth-child(3) { animation-delay: 0.62s; }
    .video-item:nth-child(4) { animation-delay: 0.74s; }
    .video-item:nth-child(5) { animation-delay: 0.84s; }
    .video-item:nth-child(6) { animation-delay: 0.92s; }

    .video-embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      background: #e8e5df;
      overflow: hidden;
    }

    .video-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .video-meta {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      text-align: center;
    }

    .video-show {
      font-family: 'Cormorant', serif;
      font-weight: 400;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      letter-spacing: 0.01em;
      line-height: 1.3;
    }

    .video-subtitle {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(0.9rem, 1.4vw, 1.05rem);
      letter-spacing: 0.01em;
      line-height: 1.3;
    }

    .video-type {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.3vw, 1rem);
      letter-spacing: 0.02em;
      line-height: 1.3;
      color: var(--mid);
    }

    .video-client {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 0.3rem;
    }

    /* ── DIVIDER ── */
    .grid-divider {
      height: 1px;
      background: var(--rule);
      margin: 5rem 4rem 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1s;
    }

    /* ── FOOTER ── */
    footer {
      padding: 2.5rem 4rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1.1s;
    }

    .footer-copy {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .footer-email {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--black);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .footer-email:hover {
      color: var(--mid);
      border-color: var(--mid);
    }

    /* ── ANIMATION ── */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .video-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .video-grid {
        grid-template-columns: 1fr;
      }
      header, main, footer, .grid-divider {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      header {
        flex-direction: column;
        gap: 0.5rem;
        padding-top: 2rem;
        padding-bottom: 1.75rem;
      }
      .video-meta {
        flex-direction: column;
        gap: 0.35rem;
      }
      main {
        padding-top: 2.5rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <span class="site-name">Graham Carroll</span>
    <span class="site-title">Editor</span>
  </header>

  <main>
    <div class="video-grid">

      <!-- VIDEO 1 -->

        </div>
        <div class="video-meta">
          <span class="video-show">Physical</span>

          <span class="video-client">Apple TV+</span>
        </div>
      </div>

      <!-- VIDEO 2 -->
      <div class="video-item">
        <div class="video-embed">
          <iframe src="https://player.vimeo.com/video/1168341875?h=360fdd5023&title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>
        <div class="video-meta">
          <span class="video-show">The Handmaid's Tale</span>
          <span class="video-subtitle">"An Unlikely Alliance"</span>
          <span class="video-type">EPK</span>
          <span class="video-client">Hulu</span>
        </div>
      </div>

      <!-- VIDEO 3 -->
      <div class="video-item">
        <div class="video-embed">
          <iframe src="https://player.vimeo.com/video/1168341818?h=6509ab2611&title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>
        <div class="video-meta">
          <span class="video-show">Sing</span>
          <span class="video-subtitle">"Thriller"</span>
          <span class="video-type">Official Trailer</span>
          <span class="video-client">Netflix / Illumination</span>
        </div>
      </div>

    </div>
  </main>

  <div class="grid-divider"></div>

  <footer>
    <span class="footer-copy">&copy; 2026 Graham Carroll</span>
    <a class="footer-email" href="mailto:grahamdcarroll@gmail.com">grahamdcarroll@gmail.com</a>
  </footer>

</body>
</html>
