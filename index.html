<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graham Carroll — Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --white: #f5f4f0; --black: #0e0e0e; --mid: #8a8880; --rule: #d8d5cf; --accent: #b8a99a; }
    html { scroll-behavior: smooth; }
    body { background: var(--white); color: var(--black); font-family: 'Geist Mono', monospace; font-weight: 300; min-height: 100vh; }

    header { display: flex; align-items: baseline; justify-content: space-between; padding: 3rem 4rem 2.5rem; border-bottom: 1px solid var(--rule); opacity: 0; animation: fadeUp 0.9s ease forwards; animation-delay: 0.1s; }
    .site-name { font-family: 'Cormorant', serif; font-weight: 300; font-size: clamp(1.6rem, 3vw, 2.4rem); letter-spacing: 0.02em; line-height: 1; }
    .site-title { font-weight: 300; font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mid); }

    main { padding: 4rem; }
    .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3.5rem 3rem; }

    .video-item { opacity: 0; transform: translateY(24px); animation: fadeUp 0.8s ease forwards; cursor: pointer; }
    .video-item:nth-child(1) { animation-delay: 0.3s; }
    .video-item:nth-child(2) { animation-delay: 0.48s; }
    .video-item:nth-child(3) { animation-delay: 0.62s; }
    .video-item:nth-child(4) { animation-delay: 0.74s; }
    .video-item:nth-child(5) { animation-delay: 0.84s; }
    .video-item:nth-child(6) { animation-delay: 0.92s; }

    .video-thumb { position: relative; width: 100%; padding-bottom: 56.25%; background: #e8e5df; overflow: hidden; }
    .video-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.25s; pointer-events: none; }
    .video-item:hover .video-thumb img { opacity: 0.78; }

    .play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2; pointer-events: none; }
    .play-btn svg { width: 48px; height: 48px; opacity: 0; transform: scale(0.85); transition: opacity 0.25s, transform 0.25s; }
    .video-item:hover .play-btn svg { opacity: 1; transform: scale(1); }

    .video-meta { margin-top: 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.15rem; text-align: center; }
    .video-show { font-family: 'Cormorant', serif; font-weight: 400; font-size: clamp(1rem, 1.6vw, 1.2rem); letter-spacing: 0.01em; line-height: 1.3; }
    .video-subtitle { font-family: 'Cormorant', serif; font-weight: 300; font-style: italic; font-size: clamp(0.9rem, 1.4vw, 1.05rem); letter-spacing: 0.01em; line-height: 1.3; }
    .video-type { font-family: 'Cormorant', serif; font-weight: 300; font-size: clamp(0.85rem, 1.3vw, 1rem); letter-spacing: 0.02em; line-height: 1.3; color: var(--mid); }
    .video-client { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); margin-top: 0.3rem; }

    .lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(10,10,10,0.93); align-items: center; justify-content: center; padding: 2rem; opacity: 0; transition: opacity 0.3s ease; }
    .lightbox.open { display: flex; }
    .lightbox.visible { opacity: 1; }
    .lightbox-inner { position: relative; width: 100%; max-width: 1100px; transform: scale(0.95); transition: transform 0.3s ease; }
    .lightbox.visible .lightbox-inner { transform: scale(1); }
    .lightbox-video { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
    .lightbox-video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .lightbox-close { position: absolute; top: -2.5rem; right: 0; background: none; border: none; color: #f5f4f0; font-family: 'Geist Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; padding: 0.25rem 0; }
    .lightbox-close:hover { opacity: 1; }

    .grid-divider { height: 1px; background: var(--rule); margin: 5rem 4rem 0; opacity: 0; animation: fadeUp 0.8s ease forwards; animation-delay: 1s; }
    footer { padding: 2.5rem 4rem 3rem; display: flex; align-items: center; justify-content: space-between; opacity: 0; animation: fadeUp 0.8s ease forwards; animation-delay: 1.1s; }
    .footer-copy { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); }
    .footer-email { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--black); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 1px; transition: color 0.2s, border-color 0.2s; }
    .footer-email:hover { color: var(--mid); border-color: var(--mid); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) { .video-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr; }
      header, main, footer, .grid-divider { padding-left: 1.5rem; padding-right: 1.5rem; }
      header { flex-direction: column; gap: 0.5rem; padding-top: 2rem; padding-bottom: 1.75rem; }
      main { padding-top: 2.5rem; }
      .lightbox { padding: 0; background: #000; }
      .lightbox-inner { max-width: 100%; display: flex; align-items: center; flex-direction: column; justify-content: center; height: 100%; }
      .lightbox-close { position: fixed; top: 1rem; right: 1rem; }
    }
  </style>
</head>

    function playVideo(vimeoId, hash) {
      var lb = document.getElementById('lightbox');
      var fr = document.getElementById('lightbox-iframe');
      fr.src = 'https://player.vimeo.com/video/' + vimeoId + '?h=' + hash + '&autoplay=1&title=0&byline=0&portrait=0&badge=0';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { lb.classList.add('visible'); });
      });
    }

    function closeLightbox() {
      var lb = document.getElementById('lightbox');
      var fr = document.getElementById('lightbox-iframe');
      lb.classList.remove('visible');
      setTimeout(function() {
        lb.classList.remove('open');
        fr.src = '';
        document.body.style.overflow = '';
      }, 300);
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
